name: Grillmark
options:
  bundleIdPrefix: com.shimondeitel.grilllog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Grillmark:
    type: application
    platform: iOS
    sources:
      - path: Grillmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grilllog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Grillmark/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GrillmarkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrillmarkTests
      - path: Grillmark.storekit
    dependencies:
      - target: Grillmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grilllog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GrillmarkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GrillmarkUITests
    dependencies:
      - target: Grillmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grilllog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Grillmark:
    build:
      targets:
        Grillmark: all
        GrillmarkTests: [test]
        GrillmarkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Grillmark.storekit
    test:
      config: Debug
      storeKitConfiguration: Grillmark.storekit
      targets:
        - GrillmarkTests
        - GrillmarkUITests
    archive:
      config: Release
